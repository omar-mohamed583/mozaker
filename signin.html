          <fieldset class="d-flex flex-column">

            <button class="rounded-pill mb-3" type="button" id="googleBtn">

            </button>

          <fieldset class="d-flex flex-column text-center mt-3">
            <legend class="position-relative" data-i18n="or">or</legend>

            <button type="submit" class="mt-4 mb-3 rounded-pill">

            </button>

          </fieldset>
